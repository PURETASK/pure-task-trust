      <main>
        <section>
          <h2>Why PureTask?</h2>
          <ul>
            <li><strong>Background-Checked Cleaners</strong> — Every cleaner undergoes a comprehensive background check through a certified third-party provider before their first job. Checks include criminal history, identity verification, and sex offender registry screening. Background checks are renewed annually.</li>
            <li><strong>GPS-Verified Arrivals</strong> — Cleaners check in and out via GPS on their mobile device when they arrive and leave your home. You receive a timestamped notification with their location so you always know exactly when work starts and ends.</li>
            <li><strong>Photo-Documented Results</strong> — Cleaners take before-and-after photos of every room cleaned. Photos are uploaded to your job record so you can verify the quality of work from anywhere. Your photos are private and only visible to you and the cleaner.</li>
            <li><strong>Escrow Payment Protection</strong> — When you book, your credits are placed on hold (not charged). After the cleaning is complete, you have a 24-hour review window to inspect the photos and approve the job. Credits are only released to the cleaner once you approve. If there is a problem, you can open a dispute and your credits remain protected.</li>
          </ul>
        </section>

        <section>
          <h2>How It Works</h2>
          <ol>
            <li><strong>Book in 60 seconds</strong> — Choose your cleaning type (standard, deep, move-out, or Airbnb turnover), select the number of hours, and pick your preferred date and time.</li>
            <li><strong>Get matched</strong> — PureTask matches you with a verified, background-checked cleaner available in your area.</li>
            <li><strong>They clean</strong> — Your cleaner checks in via GPS and documents the job with before-and-after photos.</li>
            <li><strong>You approve and pay</strong> — Review the photo proof within 24 hours and approve payment. Credits are only released when you are satisfied.</li>
          </ol>
        </section>

        <section>
          <h2>Cleaning Services Offered</h2>
          <ul>
            <li><a href="/cleaning-scope">Standard Home Cleaning</a> — Regular maintenance cleaning including dusting, vacuuming, mopping, kitchen and bathroom surfaces.</li>
            <li><a href="/cleaning-scope">Deep Cleaning</a> — Thorough top-to-bottom cleaning including inside appliances, baseboards, light fixtures, and all surfaces.</li>
            <li><a href="/cleaning-scope">Move-Out Cleaning</a> — Comprehensive cleaning for end-of-tenancy or property handover.</li>
            <li><a href="/cleaning-scope">Airbnb Turnover Cleaning</a> — Fast turnaround cleaning between guest stays with linen change and restocking.</li>
          </ul>
        </section>

        <section>
          <h2>Pricing</h2>
          <p>PureTask uses a credits system where 1 credit = $1 USD. Cleaners set their own hourly rates, typically between $25 and $60 per hour. You only pay for actual hours worked. Unused credits never expire. <a href="/pricing">View full pricing details</a>.</p>
